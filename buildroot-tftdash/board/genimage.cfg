image boot.vfat {
	vfat {
		files = {
			"bcm2837-rpi-3-b.dtb",
			"bcm2837-rpi-3-b-plus.dtb",
			"rpi-firmware/bootcode.bin",
			"rpi-firmware/start.elf",
			"rpi-firmware/fixup.dat",
			"rpi-firmware/config.txt",
			"rpi-firmware/cmdline.txt",
			"Image"
		}
	}

	size = 32M
}

image data.ext4 {
	ext4 {
		label = "data"
	}

	mountpoint = "/data"
	size = 16M
}

image sdcard.img {
	hdimage {
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs_a {
		partition-type = 0x83
		image = "rootfs.ext4"
	}

	partition rootfs_b {
		partition-type = 0x83
		image = "rootfs.ext4"
	}

	partition data {
		partition-type = 0x83
		image = "data.ext4"
	}
}
